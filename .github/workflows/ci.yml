name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y etcd-server protobuf-compiler
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --exclude autumn-fuse --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --exclude autumn-fuse
      - name: Unit tests
        run: cargo test --workspace --lib --exclude autumn-fuse
      - name: Integration tests
        run: cargo test --workspace --tests --exclude autumn-fuse -- --test-threads=1
