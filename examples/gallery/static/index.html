<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autumn Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" media="print" onload="this.media='all'">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0b;
  --surface: #131315;
  --surface-raised: #1a1a1d;
  --border: #2a2a2e;
  --border-active: #4a4a50;
  --text: #e8e6e3;
  --text-dim: #7a7880;
  --text-muted: #4a4850;
  --accent: #c5a05e;
  --accent-dim: #8a7040;
  --danger: #c45050;
  --danger-dim: #3a1818;
  --success: #50a868;
  --radius: 6px;
  --mono: 'DM Mono', 'SF Mono', monospace;
  --serif: 'Instrument Serif', Georgia, serif;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast: 150ms;
  --dur-slow: 320ms;
  --num-feat: 'tnum' 1, 'cv11' 1;
}

/* Tabular numerals on UI elements that show counts, sizes, percentages */
.file-ext, .dl-pct, .progress-label, #fileCount,
.hud, .hud * { font-feature-settings: var(--num-feat); }

/* Visible focus ring for keyboard users */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 2px;
}
button:focus:not(:focus-visible) { outline: none; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

html { font-size: 15px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Noise overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
  z-index: 9999;
}

/* ── Layout ── */
.shell {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

header h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 2.2rem;
  letter-spacing: -0.02em;
  color: var(--text);
}

header h1 em {
  color: var(--accent);
  font-style: italic;
}

header .tag {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding-top: 0.5rem;
}

.grid {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 1.5rem;
  align-items: start;
}

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
}

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-head {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.card-head .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.7;
}

.card-body { padding: 1rem; }

/* ── Upload zone ── */
.drop-zone {
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  padding: 2rem 1rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(197, 160, 94, 0.04);
}

.drop-zone.dragover {
  box-shadow: inset 0 0 30px rgba(197, 160, 94, 0.06);
}

.drop-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  z-index: 2;
}

.drop-zone .icon {
  font-size: 1.8rem;
  margin-bottom: 0.5rem;
  opacity: 0.4;
}

.drop-zone p {
  font-size: 0.75rem;
  color: var(--text-dim);
  line-height: 1.6;
}

.drop-zone p strong {
  color: var(--accent);
  font-weight: 400;
}

/* ── Progress ── */
.progress-wrap {
  margin-top: 0.75rem;
  display: none;
}

.progress-wrap.active { display: block; }

.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.15s ease;
}

.progress-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 0.4rem;
  text-align: right;
}

/* ── File list ── */
.file-list {
  max-height: 420px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.file-list.grid {
  max-height: 560px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
  gap: 0.5rem;
  padding: 0.5rem;
}

.file-list::-webkit-scrollbar { width: 4px; }
.file-list::-webkit-scrollbar-track { background: transparent; }
.file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.file-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.55rem 0.75rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  font-size: 0.8rem;
}

.file-item:last-child { border-bottom: none; }

.file-item:hover { background: var(--surface-raised); }

.file-item.active { background: rgba(197, 160, 94, 0.08); }

/* Grid cells reuse .file-item but rearrange children */
.file-list.grid .file-item {
  flex-direction: column;
  align-items: stretch;
  padding: 0;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 1;
  position: relative;
}

.file-list.grid .file-item.active {
  border-color: var(--accent);
  background: transparent;
}

.file-list.grid .file-item:hover { background: transparent; }
.file-list.grid .file-item:hover .file-thumb { filter: brightness(1.05); }

.file-thumb {
  flex: 1;
  min-height: 0;
  background: var(--surface-raised);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  color: var(--text-muted);
  position: relative;
  overflow: hidden;
}

.file-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.file-thumb .play-glyph {
  font-size: 1.8rem;
  color: var(--accent);
  text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
}

/* When the video thumb has an extracted frame behind it, the play glyph
   becomes a small overlay disc rather than the cell's primary content. */
.file-thumb.video.has-frame .play-glyph {
  position: absolute;
  width: 2.4rem;
  height: 2.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(10, 10, 11, 0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  font-size: 0.9rem;
  text-shadow: none;
  pointer-events: none;
}

.file-thumb .ext-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent-dim);
}

.file-list.grid .file-meta {
  display: flex;
  align-items: center;
  padding: 0.35rem 0.5rem;
  border-top: 1px solid var(--border);
  background: var(--surface);
  font-size: 0.7rem;
  gap: 0.4rem;
}

.file-list.grid .file-meta .file-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-list.grid .file-del {
  opacity: 0.4;
}

/* View toggle in card head */
.view-toggle {
  display: inline-flex;
  margin-left: auto;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.view-toggle button {
  background: transparent;
  border: none;
  color: var(--text-muted);
  padding: 0.2rem 0.5rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.view-toggle button:hover { color: var(--text); }
.view-toggle button.active {
  background: rgba(197, 160, 94, 0.12);
  color: var(--accent);
}
.view-toggle button + button { border-left: 1px solid var(--border); }

.file-ext {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent-dim);
  background: rgba(197, 160, 94, 0.1);
  padding: 0.15rem 0.35rem;
  border-radius: 3px;
  min-width: 2.5rem;
  text-align: center;
  flex-shrink: 0;
}

.file-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text);
}

.file-del {
  opacity: 0;
  border: none;
  background: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 0.1rem 0.3rem;
  border-radius: 3px;
  transition: all 0.15s;
  flex-shrink: 0;
  font-family: var(--mono);
}

.file-item:hover .file-del { opacity: 0.6; }
.file-del:hover { opacity: 1 !important; background: var(--danger-dim); }

.file-empty {
  padding: 2rem 1rem;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* ── Preview ── */
.preview-area {
  min-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.preview-area .empty-state {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.75rem;
  line-height: 2;
}

.preview-area .empty-state .glyph {
  font-size: 2.5rem;
  opacity: 0.2;
  display: block;
  margin-bottom: 0.5rem;
}

.preview-area img {
  max-width: 100%;
  max-height: 500px;
  border-radius: var(--radius);
  object-fit: contain;
  cursor: zoom-in;
  transition: opacity 0.15s;
}

.preview-area img:hover { opacity: 0.92; }

/* ── Lightbox ── */
.lightbox {
  position: fixed;
  inset: 0;
  background: var(--lb-dominant, rgb(5, 5, 6));
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10001;
  cursor: zoom-out;
  padding: 1.5rem;
  animation: lightbox-in 0.18s ease forwards;
  overflow: hidden;
  transition: background-color 320ms ease;
}

.lightbox.active { display: flex; }

.lightbox .lb-backdrop {
  position: absolute;
  inset: -8%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: blur(48px) saturate(1.4) brightness(0.7);
  transform: scale(1.1);
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 320ms ease;
}

.lightbox .lb-backdrop.active { opacity: 0.85; }

.lightbox .lb-backdrop::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(5, 5, 6, 0.35);
}

.lightbox .lb-img-layer {
  position: absolute;
  top: 50%;
  left: 50%;
  max-width: calc(100% - 3rem);
  max-height: calc(100% - 8rem);
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
  z-index: 1;
  opacity: 0;
  transform: translate(-50%, -50%);
  transition: opacity 220ms ease, transform 220ms ease;
  pointer-events: none;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
}

.lightbox .lb-img-layer.active {
  opacity: 1;
  pointer-events: auto;
}

.lightbox .lb-img-layer.from-left  { transform: translate(calc(-50% - 60px), -50%); }
.lightbox .lb-img-layer.from-right { transform: translate(calc(-50% + 60px), -50%); }

.lightbox video {
  /* Absolute-center mirrors the image layer pattern. We don't rely on the
     flex centering for video because the element's intrinsic size after
     metadata (videoWidth × videoHeight, e.g. 1080×1920 for portrait clips)
     can interact with flex sizing in surprising ways and shift the box. */
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
  max-width: calc(100% - 3rem);
  max-height: calc(100% - 8rem);
  min-width: 0;
  min-height: 0;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
  background: #000;
  outline: none;
}
.lightbox video.hidden { display: none; }

@media (prefers-reduced-motion: reduce) {
  .lightbox .lb-img-layer { transition: opacity 200ms ease; }
  .lightbox .lb-img-layer.from-left,
  .lightbox .lb-img-layer.from-right { transform: translate(-50%, -50%); }
  .lightbox .lb-backdrop { transition: opacity 200ms ease; }
}

.lightbox .lb-close {
  position: absolute;
  top: 1rem;
  right: 1.25rem;
  font-family: var(--mono);
  font-size: 1.4rem;
  color: var(--text-dim);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0.25rem 0.6rem;
  border-radius: 3px;
  transition: color 0.15s, background 0.15s;
}

.lightbox .lb-close:hover { color: var(--text); background: var(--surface-raised); }

.lightbox .lb-caption {
  position: absolute;
  bottom: 1rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  background: var(--surface);
  padding: 0.3rem 0.7rem;
  border-radius: 3px;
  border: 1px solid var(--border);
  max-width: 80%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  z-index: 2;
}

.lightbox .lb-strip {
  position: absolute;
  bottom: 3rem;
  left: 50%;
  transform: translateX(-50%);
  max-width: calc(100% - 3rem);
  display: flex;
  gap: 0.4rem;
  padding: 0.45rem;
  background: rgba(0, 0, 0, 0.42);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 8px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
  z-index: 2;
  scroll-behavior: smooth;
  cursor: default;
}

.lightbox .lb-strip:empty,
.lightbox .lb-strip.hidden { display: none; }

.lightbox .lb-strip::-webkit-scrollbar { height: 4px; }
.lightbox .lb-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
.lightbox .lb-strip::-webkit-scrollbar-track { background: transparent; }

.lb-strip-thumb {
  flex: 0 0 auto;
  width: 64px;
  height: 64px;
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid transparent;
  transition: border-color 0.15s, transform 0.15s;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lb-strip-thumb:hover { transform: translateY(-1px); }

.lb-strip-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.lb-strip-thumb.active {
  border-color: var(--accent);
}

.lb-strip-thumb .play-glyph {
  font-size: 1.2rem;
  color: rgba(255, 255, 255, 0.75);
}

/* Video strip cells: server-extracted frame behind a small overlay disc. */
.lb-strip-thumb.video { position: relative; }
.lb-strip-thumb.video .play-glyph {
  position: absolute;
  width: 1.6rem;
  height: 1.6rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  font-size: 0.7rem;
  pointer-events: none;
}

/* Strip toggle button */
.lightbox .lb-strip-toggle {
  position: absolute;
  bottom: 1.5rem;
  right: 1.5rem;
  width: 2.4rem;
  height: 2.4rem;
  border-radius: 50%;
  background: rgba(10, 10, 11, 0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: rgba(255, 255, 255, 0.85);
  font-size: 0.95rem;
  line-height: 1;
  cursor: pointer;
  z-index: 3;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.75;
  transition: opacity var(--dur-fast) var(--ease),
              background var(--dur-fast) var(--ease),
              border-color var(--dur-fast) var(--ease),
              color var(--dur-fast) var(--ease);
}
.lightbox .lb-strip-toggle:hover { opacity: 1; background: rgba(10, 10, 11, 0.7); }
.lightbox .lb-strip-toggle.active {
  color: var(--accent);
  border-color: var(--accent);
  opacity: 1;
}
.lightbox .lb-strip-toggle.hidden { display: none; }

@keyframes lightbox-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

.preview-area video {
  max-width: 100%;
  max-height: 500px;
  border-radius: var(--radius);
  outline: none;
}

.preview-area iframe {
  width: 100%;
  height: 500px;
  border: none;
  border-radius: var(--radius);
  background: #fff;
}

.preview-area pre {
  width: 100%;
  max-height: 500px;
  overflow: auto;
  padding: 1rem;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text-dim);
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-all;
}

.preview-filename {
  position: absolute;
  top: 0.75rem;
  left: 0.75rem;
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  background: var(--surface);
  padding: 0.25rem 0.5rem;
  border-radius: 3px;
  border: 1px solid var(--border);
  z-index: 2;
}

.preview-expand {
  position: absolute;
  top: 0.65rem;
  right: 0.65rem;
  width: 28px;
  height: 28px;
  font-size: 1rem;
  line-height: 1;
  font-family: var(--mono);
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  z-index: 2;
  opacity: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s, background 0.15s, border-color 0.15s;
}

.preview-area:hover .preview-expand,
.preview-expand:focus { opacity: 1; }

.preview-expand:hover {
  background: var(--surface-raised);
  border-color: var(--accent);
  color: var(--accent);
}

.preview-loader {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(10, 10, 11, 0.85);
  border-radius: var(--radius);
  z-index: 3;
  gap: 0.75rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur-fast) var(--ease);
}

.preview-loader.active {
  opacity: 1;
  pointer-events: auto;
}

.spinner {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 0%, var(--accent) 100%);
  -webkit-mask: radial-gradient(circle, transparent 50%, black 52%);
          mask: radial-gradient(circle, transparent 50%, black 52%);
  animation: spin 900ms linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.preview-loader .dl-pct {
  font-size: 0.65rem;
  color: var(--text-muted);
}

/* ── Toast ── */
.toast-rack {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  display: flex;
  flex-direction: column-reverse;
  gap: 0.5rem;
  z-index: 10000;
  pointer-events: none;
}

.toast {
  pointer-events: auto;
  padding: 0.6rem 1rem;
  border-radius: var(--radius);
  font-size: 0.72rem;
  font-family: var(--mono);
  color: var(--text);
  background: var(--surface-raised);
  border: 1px solid var(--border);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: toast-in 0.3s ease forwards;
  max-width: 320px;
}

.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }

.toast.out { animation: toast-out 0.25s ease forwards; }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes toast-out {
  to { opacity: 0; transform: translateY(-5px) scale(0.97); }
}

/* ── Animations ── */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-up {
  animation: fade-up 0.4s ease forwards;
  opacity: 0;
}

.fade-up:nth-child(1) { animation-delay: 0.05s; }
.fade-up:nth-child(2) { animation-delay: 0.12s; }
.fade-up:nth-child(3) { animation-delay: 0.19s; }

/* ── Performance HUD ── */
.hud {
  position: fixed;
  bottom: 1.5rem;
  left: 1.5rem;
  z-index: 9998;
  display: grid;
  grid-template-columns: auto auto;
  column-gap: 0.9rem;
  row-gap: 0.2rem;
  align-items: baseline;
  padding: 0.65rem 0.9rem;
  background: rgba(19, 19, 21, 0.72);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  backdrop-filter: blur(10px) saturate(1.2);
  -webkit-backdrop-filter: blur(10px) saturate(1.2);
  font-size: 0.6rem;
  font-family: var(--mono);
  letter-spacing: 0.06em;
  pointer-events: none;
  user-select: none;
  opacity: 0.78;
  transition: opacity var(--dur-fast) var(--ease);
}
.hud:hover { opacity: 1; }
.hud .hud-label {
  color: var(--text-muted);
  text-transform: uppercase;
}
.hud .hud-value {
  color: var(--text);
  text-align: right;
  min-width: 5.5rem;
  transition: color 0.45s var(--ease);
}
.hud .hud-value.flash { color: var(--accent); }
@media (max-width: 720px) { .hud { display: none; } }

/* Transcoding placeholder for video grid cells */
.file-thumb.video.transcoding {
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.04);
}
.file-thumb.video.transcoding .transcode-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  position: relative; z-index: 2;
}
.file-thumb.video.transcoding .transcode-label {
  position: absolute; bottom: 6px; left: 0; right: 0; text-align: center;
  font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.04em;
  z-index: 2;
}
.file-thumb.video.failed {
  display: flex; align-items: center; justify-content: center;
  background: rgba(180,40,40,0.08);
  color: #ff8a8a; font-size: 1.4rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
</head>
<body>

<div class="shell">
  <header class="fade-up">
    <h1>Autumn <em>Gallery</em></h1>
    <span class="tag">distributed file store</span>
  </header>

  <div class="grid">
    <!-- Left panel -->
    <div style="display:flex;flex-direction:column;gap:1.5rem;">
      <!-- Upload card -->
      <div class="card fade-up">
        <div class="card-head"><span class="dot"></span> Upload</div>
        <div class="card-body">
          <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" multiple />
            <div class="icon">+</div>
            <p>Drop files here or <strong>browse</strong><br>
            <span style="font-size:0.65rem;color:var(--text-muted)">Multiple files supported</span></p>
          </div>
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-label" id="progressLabel">0%</div>
          </div>
        </div>
      </div>

      <!-- Files card -->
      <div class="card fade-up">
        <div class="card-head">
          <span class="dot"></span> Files
          <span id="fileCount" style="color:var(--text-muted);margin-left:0.4rem"></span>
          <span style="color:var(--text-muted);font-size:0.6rem;letter-spacing:0.05em;margin-left:0.4rem">↑↓</span>
          <span class="view-toggle" role="tablist" aria-label="View mode">
            <button type="button" id="viewList" title="List view" aria-label="List view">≡</button>
            <button type="button" id="viewGrid" title="Grid view" aria-label="Grid view">▦</button>
          </span>
        </div>
        <div class="file-list" id="fileList">
          <div class="file-empty">No files yet</div>
        </div>
      </div>
    </div>

    <!-- Preview card -->
    <div class="card fade-up" style="position:sticky;top:1.5rem;">
      <div class="card-head"><span class="dot"></span> Preview</div>
      <div class="card-body">
        <div class="preview-area" id="previewArea">
          <div class="preview-loader" id="previewLoader">
            <div class="spinner" aria-hidden="true"></div>
            <span class="dl-pct" id="dlPct">0%</span>
          </div>
          <div class="empty-state" id="emptyState">
            <span class="glyph">&#9671;</span>
            Select a file to preview
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-label="Media preview" aria-hidden="true">
  <div class="lb-backdrop" id="lbBackdropA"></div>
  <div class="lb-backdrop" id="lbBackdropB"></div>
  <button class="lb-close" id="lbClose" type="button" aria-label="Close">×</button>
  <img id="lbImageA" alt="" class="lb-img-layer" />
  <img id="lbImageB" alt="" class="lb-img-layer" />
  <video id="lbVideo" controls preload="metadata" class="hidden" playsinline></video>
  <div class="lb-strip" id="lbStrip" role="tablist" aria-label="Gallery thumbnails"></div>
  <button
    class="lb-strip-toggle hidden"
    id="lbStripToggle"
    type="button"
    aria-label="Toggle thumbnails (T)"
    aria-pressed="false"
    title="Toggle thumbnails (T)"
  ><span aria-hidden="true">▦</span></button>
  <div class="lb-caption" id="lbCaption"></div>
</div>

<div class="toast-rack" id="toastRack"></div>

<div class="hud" id="hud" aria-hidden="true">
  <span class="hud-label">↑ up</span>      <span class="hud-value" id="hudUp">—</span>
  <span class="hud-label">↓ load</span>    <span class="hud-value" id="hudPreview">—</span>
  <span class="hud-label">thumb</span>     <span class="hud-value" id="hudThumb">—</span>
  <span class="hud-label">files</span>     <span class="hud-value" id="hudFiles">0</span>
</div>

<script>
(function() {
  const $ = s => document.querySelector(s);
  const dropZone = $('#dropZone');
  const fileInput = $('#fileInput');
  const progressWrap = $('#progressWrap');
  const progressFill = $('#progressFill');
  const progressLabel = $('#progressLabel');
  const fileList = $('#fileList');
  const fileCount = $('#fileCount');
  const previewArea = $('#previewArea');
  const previewLoader = $('#previewLoader');
  const dlPct = $('#dlPct');
  const emptyState = $('#emptyState');
  const toastRack = $('#toastRack');
  const lightbox = $('#lightbox');
  const lbImageA = $('#lbImageA');
  const lbImageB = $('#lbImageB');
  const lbBackdropA = $('#lbBackdropA');
  const lbBackdropB = $('#lbBackdropB');
  const lbVideo = $('#lbVideo');
  const lbCaption = $('#lbCaption');
  const lbClose = $('#lbClose');
  const lbStrip = $('#lbStrip');
  const viewListBtn = $('#viewList');
  const viewGridBtn = $('#viewGrid');
  const hudUp = $('#hudUp');
  const hudPreview = $('#hudPreview');
  const hudThumb = $('#hudThumb');
  const hudFiles = $('#hudFiles');

  // ── Perf HUD ──
  // The HUD reflects the underlying autumn storage layer, NOT browser-perceived
  // latency. The server tracks EMA latency + throughput for every put/get and
  // for the JPEG thumbnail build (run on a compio blocking thread); this loop
  // polls /metrics/ once per second and on demand after user actions.
  function fmtRate(bps) {
    if (!isFinite(bps) || bps <= 0) return '—';
    if (bps >= 1024 * 1024) return (bps / (1024 * 1024)).toFixed(1) + ' MB/s';
    if (bps >= 1024) return (bps / 1024).toFixed(1) + ' KB/s';
    return Math.round(bps) + ' B/s';
  }
  function fmtMs(ms) {
    if (!isFinite(ms) || ms <= 0) return '—';
    if (ms >= 1000) return (ms / 1000).toFixed(2) + ' s';
    return ms.toFixed(1) + ' ms';
  }
  function fmtLatBw(ms, bps) {
    const lat = fmtMs(ms);
    const rate = fmtRate(bps);
    if (lat === '—' && rate === '—') return '—';
    if (rate === '—') return lat;
    return lat + ' · ' + rate;
  }

  let lastHud = { put: '', get: '', thumb: '' };
  function flashIfChanged(el, key, next) {
    el.textContent = next;
    if (lastHud[key] === next) return;
    lastHud[key] = next;
    el.classList.remove('flash');
    void el.offsetWidth;          // restart the color transition
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 450);
  }
  function setHudFiles(n) { hudFiles.textContent = n; }

  // Video assets are stored as HLS (M3U8 + .ts segments) under .hls/<name>/.
  // The thumbnail is generated as part of the transcoding pipeline and lives
  // at the same .thumb/ prefix as image thumbnails.
  function hlsUrl(name) { return '/hls/' + encodeURIComponent(name) + '/index.m3u8'; }
  function transcodeStatusUrl(name) { return '/transcode-status/' + encodeURIComponent(name); }

  // Track active hls.js instances and per-cell pollers so we can clean up.
  const transcodePollers = new Map();   // name → timeout id
  function clearPoller(name) {
    const id = transcodePollers.get(name);
    if (id !== undefined) { clearTimeout(id); transcodePollers.delete(name); }
  }

  function attachHls(videoEl, name) {
    detachHls(videoEl);
    const url = hlsUrl(name);
    if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
      videoEl.src = url;                 // Safari native HLS
      return;
    }
    if (window.Hls && Hls.isSupported()) {
      const hls = new Hls({ enableWorker: true });
      hls.on(Hls.Events.ERROR, (_e, data) => {
        if (data && data.fatal) {
          console.warn('hls.js fatal', data);
          try { hls.destroy(); } catch (_) {}
        }
      });
      hls.loadSource(url);
      hls.attachMedia(videoEl);
      videoEl.__hls = hls;
    } else {
      videoEl.src = url;                 // last-ditch fallback
    }
  }

  function detachHls(videoEl) {
    try { videoEl.pause(); } catch (_) {}
    if (videoEl.__hls) {
      try { videoEl.__hls.destroy(); } catch (_) {}
      videoEl.__hls = null;
    }
    videoEl.removeAttribute('src');
    try { videoEl.load(); } catch (_) {}
  }

  // Render the play-glyph + thumbnail layout on a cell once we know the
  // backing video is ready. Always called after we've cleared transcoding UI.
  function renderVideoCell(thumb, name) {
    thumb.classList.remove('transcoding', 'failed');
    thumb.innerHTML = '';
    thumb.classList.add('video');
    const glyph = document.createElement('span');
    glyph.className = 'play-glyph';
    glyph.textContent = '▶';
    const img = document.createElement('img');
    img.alt = name;
    img.loading = 'lazy';
    img.src = thumbUrl(name) + '?t=' + Date.now();   // bypass stale 404 cache
    img.onload = () => thumb.classList.add('has-frame');
    img.onerror = () => { img.remove(); };
    thumb.appendChild(img);
    thumb.appendChild(glyph);
  }

  function renderTranscodingCell(thumb, name) {
    thumb.classList.add('video', 'transcoding');
    thumb.classList.remove('failed', 'has-frame');
    thumb.innerHTML =
      '<span class="transcode-spinner"></span>' +
      '<span class="transcode-label">转码中…</span>';
  }

  function renderFailedCell(thumb, _name, err) {
    thumb.classList.add('video', 'failed');
    thumb.classList.remove('transcoding', 'has-frame');
    thumb.innerHTML = '<span title="' + escHtml(err || 'transcode failed') + '">⚠</span>';
  }

  // Polls /transcode-status/<name> with backoff. Stops once the cell leaves
  // the DOM (viewMode swap / list refresh) or status is terminal.
  function pollTranscodeStatus(thumb, name, attempt) {
    if (!thumb.isConnected) { clearPoller(name); return; }
    fetch(transcodeStatusUrl(name), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : { status: 'failed', error: 'http ' + r.status })
      .catch(() => ({ status: 'failed', error: 'network' }))
      .then(j => {
        if (!thumb.isConnected) { clearPoller(name); return; }
        if (j.status === 'done') {
          clearPoller(name);
          renderVideoCell(thumb, name);
          return;
        }
        if (j.status === 'failed') {
          clearPoller(name);
          renderFailedCell(thumb, name, j.error);
          return;
        }
        // queued / transcoding — backoff: 2s × first 5, then 5s × next 5,
        // then 10s indefinitely.
        const next = attempt < 5 ? 2000 : attempt < 10 ? 5000 : 10000;
        const id = setTimeout(() => pollTranscodeStatus(thumb, name, attempt + 1), next);
        transcodePollers.set(name, id);
      });
  }

  function attachVideoThumb(thumb, name) {
    thumb.classList.add('video');
    // Probe status once before deciding whether to render the play cell or
    // a transcoding placeholder.
    fetch(transcodeStatusUrl(name), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : { status: 'failed', error: 'http ' + r.status })
      .catch(() => ({ status: 'failed', error: 'network' }))
      .then(j => {
        if (!thumb.isConnected) return;
        if (j.status === 'done') {
          renderVideoCell(thumb, name);
        } else if (j.status === 'failed') {
          renderFailedCell(thumb, name, j.error);
        } else {
          renderTranscodingCell(thumb, name);
          pollTranscodeStatus(thumb, name, 0);
        }
      });
  }

  function pollMetrics() {
    fetch('/metrics/', { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(j => {
        if (!j) return;
        flashIfChanged(hudUp,      'put',   fmtLatBw(j.put_ms, j.put_bps));
        flashIfChanged(hudPreview, 'get',   fmtLatBw(j.get_ms, j.get_bps));
        flashIfChanged(hudThumb,   'thumb', fmtMs(j.thumb_build_ms));
      })
      .catch(() => {});
  }
  setInterval(pollMetrics, 1000);

  // Two-layer crossfade state. The "active" layer is the one currently shown;
  // navigation animates the inactive layer in (slide+fade) and the active one
  // out, then swaps the pointer.
  let activeLayer = 'A';
  function activeImg()    { return activeLayer === 'A' ? lbImageA    : lbImageB; }
  function inactiveImg()  { return activeLayer === 'A' ? lbImageB    : lbImageA; }
  function activeBg()     { return activeLayer === 'A' ? lbBackdropA : lbBackdropB; }
  function inactiveBg()   { return activeLayer === 'A' ? lbBackdropB : lbBackdropA; }

  let activeFile = null;
  let files = [];
  let viewMode = (function() {
    try {
      const m = localStorage.getItem('galleryViewMode');
      return m === 'grid' ? 'grid' : 'list';
    } catch (e) { return 'list'; }
  })();

  const IMAGE_EXTS = ['jpg','jpeg','png','gif','bmp','webp','svg'];
  const VIDEO_EXTS = ['mp4','webm','ogg','mov','m4v'];
  function extOf(name) { return name.includes('.') ? name.split('.').pop().toLowerCase() : ''; }
  function isImage(name) { return IMAGE_EXTS.includes(extOf(name)); }
  function isVideo(name) { return VIDEO_EXTS.includes(extOf(name)); }
  function isMedia(name) { return isImage(name) || isVideo(name); }
  // SVG passes through /thumb (server proxies the original); raster formats
  // get the cached webp/jpeg thumbnail. Videos get a placeholder cell.
  function thumbUrl(name) { return '/thumb/' + encodeURIComponent(name); }

  // ── Toast ──
  function toast(msg, type) {
    const el = document.createElement('div');
    el.className = 'toast ' + (type || '');
    el.textContent = msg;
    toastRack.appendChild(el);
    setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 2800);
  }

  // ── Upload ──
  ['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); }));

  dropZone.addEventListener('drop', ev => {
    if (ev.dataTransfer.files.length) uploadBatch(ev.dataTransfer.files);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) { uploadBatch(fileInput.files); fileInput.value = ''; }
  });

  function uploadOne(file, onSuccess, onError, onProgress) {
    const form = new FormData();
    form.append('file', file);
    const xhr = new XMLHttpRequest();
    if (onProgress) {
      xhr.upload.onprogress = e => { if (e.lengthComputable) onProgress(e.loaded, e.total); };
    }
    xhr.onload = () => {
      if (xhr.status === 200) onSuccess(xhr.responseText);
      else onError(xhr.responseText || xhr.statusText);
    };
    xhr.onerror = () => onError('network error');
    xhr.open('POST', '/put/', true);
    xhr.send(form);
  }

  function uploadBatch(fileList) {
    const arr = Array.from(fileList);
    if (!arr.length) return;

    const total = arr.length;
    let idx = 0, completed = 0, failed = 0, firstSuccess = null;

    progressWrap.classList.add('active');
    progressFill.style.width = '0%';
    progressLabel.textContent = total === 1 ? '0%' : '0 / ' + total;

    function onFileDone() {
      const done = completed + failed;
      progressFill.style.width = Math.round(done / total * 100) + '%';
      progressLabel.textContent = done + ' / ' + total;
      if (done < total) return;
      setTimeout(() => progressWrap.classList.remove('active'), 800);
      const msg = failed
        ? completed + ' uploaded, ' + failed + ' failed'
        : completed + ' file' + (completed !== 1 ? 's' : '') + ' uploaded';
      toast(msg, failed && !completed ? 'error' : 'success');
      // Server records per-put EMA latency/throughput; pull a fresh sample.
      pollMetrics();
      refreshList(() => { if (firstSuccess) selectFile(firstSuccess); });
    }

    function worker() {
      if (idx >= total) return;
      const file = arr[idx++];
      // Single file: show byte-level XHR progress; batch: count-based only.
      const onProgress = total === 1 ? (loaded, fileTotal) => {
        const pct = Math.round(loaded / fileTotal * 100);
        progressFill.style.width = pct + '%';
        progressLabel.textContent = pct + '%';
      } : null;
      uploadOne(file, name => {
        if (!firstSuccess) firstSuccess = name;
        completed++;
        onFileDone();
        worker();
      }, err => {
        toast('Failed: ' + file.name + (err ? ' — ' + err : ''), 'error');
        failed++;
        onFileDone();
        worker();
      }, onProgress);
    }

    const concurrency = Math.min(16, total);
    for (let i = 0; i < concurrency; i++) worker();
  }

  // ── File list ──
  function refreshList(cb) {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', '/list/', true);
    xhr.onload = () => {
      if (xhr.status !== 200) return;
      const names = xhr.responseText.trim().split('\n').filter(Boolean);
      files = names;
      fileCount.textContent = names.length || '';
      setHudFiles(names.length);
      if (!names.length) {
        fileList.innerHTML = '<div class="file-empty">No files yet</div>';
        if (cb) cb();
        return;
      }
      fileList.innerHTML = '';
      names.forEach(name => fileList.appendChild(renderFileItem(name)));
      if (lightbox.classList.contains('active')) syncStrip();
      if (cb) cb();
    };
    xhr.send();
  }

  function renderFileItem(name) {
    const el = document.createElement('div');
    el.className = 'file-item' + (name === activeFile ? ' active' : '');
    el.dataset.name = name;
    const ext = extOf(name) || '?';
    if (viewMode === 'grid') {
      const thumb = document.createElement('div');
      thumb.className = 'file-thumb';
      if (isImage(name)) {
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.alt = name;
        img.src = thumbUrl(name);
        // If the thumbnail endpoint fails (404 / server error), fall back
        // to a generic ext label so we don't leave a broken-image icon.
        img.onerror = () => {
          thumb.innerHTML = '<span class="ext-label">' + escHtml(ext) + '</span>';
        };
        thumb.appendChild(img);
      } else if (isVideo(name)) {
        attachVideoThumb(thumb, name);
      } else {
        thumb.innerHTML = '<span class="ext-label">' + escHtml(ext) + '</span>';
      }
      el.appendChild(thumb);

      const meta = document.createElement('div');
      meta.className = 'file-meta';
      meta.innerHTML =
        '<span class="file-name">' + escHtml(name) + '</span>' +
        '<button class="file-del" title="Delete">&times;</button>';
      el.appendChild(meta);

      el.addEventListener('click', () => selectFile(name));
      if (isMedia(name)) el.addEventListener('dblclick', () => openLightbox(name));
      meta.querySelector('.file-del').addEventListener('click', e => {
        e.stopPropagation();
        deleteFile(name);
      });
    } else {
      el.innerHTML =
        '<span class="file-ext">' + escHtml(ext) + '</span>' +
        '<span class="file-name">' + escHtml(name) + '</span>' +
        '<button class="file-del" title="Delete">&times;</button>';
      el.querySelector('.file-name').addEventListener('click', () => selectFile(name));
      el.querySelector('.file-ext').addEventListener('click', () => selectFile(name));
      el.querySelector('.file-del').addEventListener('click', e => {
        e.stopPropagation();
        deleteFile(name);
      });
    }
    return el;
  }

  function applyViewMode() {
    fileList.classList.toggle('grid', viewMode === 'grid');
    viewListBtn.classList.toggle('active', viewMode === 'list');
    viewGridBtn.classList.toggle('active', viewMode === 'grid');
    try { localStorage.setItem('galleryViewMode', viewMode); } catch (e) {}
  }

  function setViewMode(mode) {
    if (mode !== 'list' && mode !== 'grid') return;
    if (mode === viewMode) return;
    viewMode = mode;
    applyViewMode();
    refreshList();
  }

  viewListBtn.addEventListener('click', () => setViewMode('list'));
  viewGridBtn.addEventListener('click', () => setViewMode('grid'));
  applyViewMode();

  function selectFile(name) {
    activeFile = name;
    fileList.querySelectorAll('.file-item').forEach(el => {
      el.classList.toggle('active', el.dataset.name === name);
    });
    previewFile(name);
  }

  // ── Keyboard navigation ──
  // ↑/↓ navigate the file list; when the lightbox is open, only media files
  // are visited and the lightbox follows the selection. ←/→ are aliases for
  // ↑/↓ but only when the lightbox is open (left/right is intuitive in a
  // gallery, surprising in a vertical file list).
  document.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    const lightboxOpen = lightbox.classList.contains('active');
    const isPrev = e.key === 'ArrowUp' || (lightboxOpen && e.key === 'ArrowLeft');
    const isNext = e.key === 'ArrowDown' || (lightboxOpen && e.key === 'ArrowRight');
    if (!isPrev && !isNext) return;
    if (!files.length) return;
    e.preventDefault();

    const indices = lightboxOpen
      ? files.map((n, i) => isMedia(n) ? i : -1).filter(i => i >= 0)
      : files.map((_, i) => i);
    if (!indices.length) return;

    const curAbs = activeFile ? files.indexOf(activeFile) : -1;
    let posInList = indices.indexOf(curAbs);
    if (posInList < 0) posInList = isPrev ? indices.length : -1;
    const nextPos = isPrev
      ? Math.max(0, posInList - 1)
      : Math.min(indices.length - 1, posInList + 1);
    const nextAbs = indices[nextPos];
    if (nextAbs === curAbs) return;

    selectFile(files[nextAbs]);
    const items = fileList.querySelectorAll('.file-item');
    if (items[nextAbs]) items[nextAbs].scrollIntoView({ block: 'nearest' });

    if (lightboxOpen) openLightbox(files[nextAbs]);
  });

  // Keyboard 'T' toggles the strip while the lightbox is open.
  document.addEventListener('keydown', e => {
    if (e.key !== 't' && e.key !== 'T') return;
    if (!lightbox.classList.contains('active')) return;
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (!shouldOfferStrip()) return;
    e.preventDefault();
    stripVisible = !stripVisible;
    applyStripVisibility();
  });

  // ── Delete ──
  function deleteFile(name) {
    const xhr = new XMLHttpRequest();
    xhr.open('DELETE', '/del/' + encodeURIComponent(name), true);
    xhr.onload = () => {
      if (xhr.status === 200) {
        toast('Deleted ' + name, 'success');
        if (activeFile === name) { activeFile = null; showEmpty(); }
        refreshList();
      } else {
        toast('Delete failed: ' + xhr.statusText, 'error');
      }
    };
    xhr.send();
  }

  // ── Preview ──
  // The preview loader (spinner overlay) is only relevant for the text/XHR
  // branch — it shows download progress for arbitrary files. For images,
  // videos, PDFs, the browser's native loading UI is enough, and stacking
  // our spinner on top of `<video controls>` makes a confusing two-control
  // pile-up. So `previewLoader` is added to the DOM ONLY by the text path.
  let activePreviewXhr = null;
  function resetPreviewLoaderState() {
    previewLoader.classList.remove('active');
    if (previewLoader.parentNode) previewLoader.parentNode.removeChild(previewLoader);
    if (activePreviewXhr) {
      try { activePreviewXhr.abort(); } catch (e) {}
      activePreviewXhr = null;
    }
    // Tear down any hls.js attached to the preview pane's <video>.
    previewArea.querySelectorAll('video').forEach(detachHls);
  }

  function showEmpty() {
    resetPreviewLoaderState();
    previewArea.innerHTML = '';
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.innerHTML = '<span class="glyph">&#9671;</span>Select a file to preview';
    previewArea.appendChild(es);
  }

  function previewFile(name) {
    const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
    const url = '/get/' + encodeURIComponent(name);

    resetPreviewLoaderState();
    previewArea.innerHTML = '';

    const label = document.createElement('div');
    label.className = 'preview-filename';
    label.textContent = name;
    previewArea.appendChild(label);

    if (IMAGE_EXTS.includes(ext)) {
      const img = document.createElement('img');
      img.src = url;
      img.alt = name;
      img.title = 'Click to enlarge';
      img.addEventListener('load', pollMetrics, { once: true });
      img.onerror = () => toast('Failed to load image', 'error');
      img.addEventListener('click', () => openLightbox(name));
      previewArea.appendChild(img);
      addExpandButton(name);

    } else if (VIDEO_EXTS.includes(ext)) {
      const v = document.createElement('video');
      v.controls = true;
      v.playsInline = true;
      v.addEventListener('loadeddata', pollMetrics, { once: true });
      previewArea.appendChild(v);
      addExpandButton(name);
      // Probe status; only attach hls.js once transcoding has completed.
      fetch(transcodeStatusUrl(name), { cache: 'no-store' })
        .then(r => r.ok ? r.json() : { status: 'failed', error: 'http ' + r.status })
        .catch(() => ({ status: 'failed', error: 'network' }))
        .then(j => {
          if (!v.isConnected) return;
          if (j.status === 'done') {
            attachHls(v, name);
          } else if (j.status === 'failed') {
            const note = document.createElement('div');
            note.className = 'preview-filename';
            note.style.color = '#ff8a8a';
            note.textContent = '转码失败：' + (j.error || 'unknown');
            previewArea.appendChild(note);
          } else {
            const note = document.createElement('div');
            note.className = 'preview-filename';
            note.textContent = '正在转码 — 完成后可播放';
            previewArea.appendChild(note);
          }
        });

    } else if (ext === 'pdf') {
      const f = document.createElement('iframe');
      f.addEventListener('load', pollMetrics, { once: true });
      f.src = url;
      previewArea.appendChild(f);

    } else {
      previewArea.appendChild(previewLoader);
      showLoader();
      const xhr = new XMLHttpRequest();
      activePreviewXhr = xhr;
      xhr.open('GET', url, true);
      xhr.responseType = 'text';
      xhr.onprogress = e => { if (e.lengthComputable) updateDl(e.loaded, e.total); };
      xhr.onload = () => {
        if (activePreviewXhr === xhr) activePreviewXhr = null;
        hideLoader();
        if (xhr.status === 200) {
          pollMetrics();
          const pre = document.createElement('pre');
          pre.textContent = xhr.responseText;
          previewArea.appendChild(pre);
        }
      };
      xhr.onerror = () => {
        if (activePreviewXhr === xhr) activePreviewXhr = null;
        hideLoader();
        toast('Failed to load file', 'error');
      };
      xhr.onabort = () => { hideLoader(); };
      xhr.send();
    }
  }

  function showLoader() { previewLoader.classList.add('active'); dlPct.textContent = '0%'; }
  function hideLoader() { previewLoader.classList.remove('active'); }
  function updateDl(loaded, total) { dlPct.textContent = Math.round(loaded / total * 100) + '%'; }

  function addExpandButton(name) {
    const btn = document.createElement('button');
    btn.className = 'preview-expand';
    btn.type = 'button';
    btn.title = 'Open in lightbox';
    btn.setAttribute('aria-label', 'Open in lightbox');
    btn.textContent = '⛶';
    btn.addEventListener('click', e => { e.stopPropagation(); openLightbox(name); });
    previewArea.appendChild(btn);
  }

  // ── Lightbox ──
  function setLayerBackdrop(el, url) {
    el.style.backgroundImage = url ? 'url("' + url.replace(/"/g, '\\"') + '")' : '';
  }

  // Sample the image into a tiny offscreen canvas and average the RGB,
  // ignoring near-black and near-white pixels (so a black corner doesn't
  // dominate the result for a sunset photo).
  const dominantCanvas = document.createElement('canvas');
  dominantCanvas.width = 16;
  dominantCanvas.height = 16;
  const dominantCtx = dominantCanvas.getContext('2d', { willReadFrequently: true });

  function extractDominantColor(img) {
    if (!img || !img.naturalWidth) return null;
    try {
      dominantCtx.clearRect(0, 0, 16, 16);
      dominantCtx.drawImage(img, 0, 0, 16, 16);
      const data = dominantCtx.getImageData(0, 0, 16, 16).data;
      let r = 0, g = 0, b = 0, n = 0;
      for (let i = 0; i < data.length; i += 4) {
        const pr = data[i], pg = data[i + 1], pb = data[i + 2];
        const sum = pr + pg + pb;
        if (sum < 40 || sum > 720) continue;
        r += pr; g += pg; b += pb; n++;
      }
      if (n === 0) return null;
      return 'rgb(' + Math.round(r / n) + ',' + Math.round(g / n) + ',' + Math.round(b / n) + ')';
    } catch (e) {
      return null;
    }
  }

  // Fully opaque so videos (which don't get the dominant-color backdrop)
  // never let the underlying preview-area player bleed through.
  const DEFAULT_LB_BG = 'rgb(5, 5, 6)';
  function setDominantFromImage(img) {
    const c = extractDominantColor(img);
    lightbox.style.setProperty('--lb-dominant', c || DEFAULT_LB_BG);
  }
  function resetDominant() {
    lightbox.style.setProperty('--lb-dominant', DEFAULT_LB_BG);
  }

  // Cache of <img> objects for neighbor prefetch — keeping references alive
  // ensures the browser keeps the decoded bitmap warm.
  const lbPrefetch = new Map();
  let lbLoadToken = 0;

  function prefetchImage(url) {
    if (lbPrefetch.has(url)) return lbPrefetch.get(url);
    const img = new Image();
    img.src = url;
    lbPrefetch.set(url, img);
    // Bound the cache so we don't leak across long sessions.
    if (lbPrefetch.size > 16) {
      const firstKey = lbPrefetch.keys().next().value;
      lbPrefetch.delete(firstKey);
    }
    return img;
  }

  function preloadNeighbors(name) {
    const idx = files.indexOf(name);
    if (idx < 0) return;
    const mediaIdx = files
      .map((n, i) => (isImage(n) ? i : -1))
      .filter(i => i >= 0);
    const pos = mediaIdx.indexOf(idx);
    if (pos < 0) return;
    [pos - 1, pos + 1, pos - 2, pos + 2].forEach(p => {
      if (p < 0 || p >= mediaIdx.length) return;
      prefetchImage('/get/' + encodeURIComponent(files[mediaIdx[p]]));
    });
  }

  // ── Lightbox thumbnail strip ──
  // We re-render the strip only when the underlying media set changes (avoids
  // re-fetching all thumbs on every navigation). Otherwise we just toggle the
  // .active class and scroll into view.
  let lbStripFiles = [];

  function syncStrip() {
    const media = files.filter(isMedia);
    const changed =
      lbStripFiles.length !== media.length ||
      lbStripFiles.some((f, i) => f !== media[i]);
    if (changed) {
      lbStripFiles = media;
      renderStrip();
    } else {
      updateStripActive();
    }
  }

  function renderStrip() {
    lbStrip.innerHTML = '';
    if (lbStripFiles.length <= 1) {
      // applyStripVisibility() will keep the strip hidden anyway, but
      // setting it here too avoids a one-frame flash if the toggle is on.
      lbStrip.classList.add('hidden');
      return;
    }
    lbStripFiles.forEach(name => {
      const t = document.createElement('button');
      t.type = 'button';
      t.className = 'lb-strip-thumb' + (name === activeFile ? ' active' : '');
      t.dataset.name = name;
      t.title = name;
      t.setAttribute('aria-label', name);
      const video = isVideo(name);
      if (isImage(name) || video) {
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.alt = '';
        img.src = thumbUrl(name);
        img.onerror = () => {
          // Preserve the video class so the overlay disc rule still
          // matches; otherwise drop back to a generic glyph.
          t.innerHTML = '<span class="play-glyph">' + (video ? '▶' : '?') + '</span>';
        };
        t.appendChild(img);
        if (video) {
          t.classList.add('video');
          const glyph = document.createElement('span');
          glyph.className = 'play-glyph';
          glyph.textContent = '▶';
          t.appendChild(glyph);
        }
      } else {
        t.innerHTML = '<span class="play-glyph">▶</span>';
      }
      t.addEventListener('click', e => {
        e.stopPropagation();
        selectFile(name);
        openLightbox(name);
      });
      lbStrip.appendChild(t);
    });
    // Don't toggle .hidden here — applyStripVisibility() owns that.
    scrollActiveStripIntoView();
  }

  function updateStripActive() {
    lbStrip.querySelectorAll('.lb-strip-thumb').forEach(t => {
      t.classList.toggle('active', t.dataset.name === activeFile);
    });
    scrollActiveStripIntoView();
  }

  function scrollActiveStripIntoView() {
    const a = lbStrip.querySelector('.lb-strip-thumb.active');
    if (a) a.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  }

  // Strip clicks should never close the lightbox.
  lbStrip.addEventListener('click', e => e.stopPropagation());

  // ── Strip toggle ──
  // The thumbnail strip is hidden by default whenever the lightbox opens.
  // A small disc button at bottom-right toggles it on; pressing 'T' is an
  // alias. The button itself hides if there's nothing to show (≤1 media).
  const lbStripToggle = $('#lbStripToggle');
  let stripVisible = false;
  function shouldOfferStrip() { return lbStripFiles.length > 1; }
  function applyStripVisibility() {
    const offer = shouldOfferStrip();
    lbStripToggle.classList.toggle('hidden', !offer);
    const show = offer && stripVisible;
    lbStrip.classList.toggle('hidden', !show);
    lbStripToggle.classList.toggle('active', show);
    lbStripToggle.setAttribute('aria-pressed', show ? 'true' : 'false');
    if (show) scrollActiveStripIntoView();
  }
  lbStripToggle.addEventListener('click', e => {
    e.stopPropagation();
    stripVisible = !stripVisible;
    applyStripVisibility();
  });

  // Direction: -1 = previous (slide in from left), +1 = next (slide in from
  // right), 0 = no animation (fresh open or jump via strip click). Track the
  // last-shown name so navigations can derive direction automatically.
  let lastShownName = null;

  function directionBetween(a, b) {
    if (!a || !b) return 0;
    const media = files.filter(isMedia);
    const ai = media.indexOf(a), bi = media.indexOf(b);
    if (ai < 0 || bi < 0) return 0;
    if (bi > ai) return 1;
    if (bi < ai) return -1;
    return 0;
  }

  function showImageOnLayer(url, name, direction) {
    const inImg = inactiveImg();
    const inBg = inactiveBg();
    const outImg = activeImg();
    const outBg = activeBg();

    inImg.src = url;
    inImg.alt = name;
    setLayerBackdrop(inBg, url);

    if (direction === 0) {
      // No animation: just snap to the active state.
      inImg.classList.remove('from-left', 'from-right');
      inImg.classList.add('active');
      inBg.classList.add('active');
      outImg.classList.remove('active');
      outBg.classList.remove('active');
    } else {
      // Position the inactive layer offscreen, force reflow, then animate in.
      inImg.classList.remove('active');
      inImg.classList.add(direction > 0 ? 'from-right' : 'from-left');
      void inImg.offsetWidth; // force a reflow so the next change animates
      inImg.classList.remove('from-left', 'from-right');
      inImg.classList.add('active');
      inBg.classList.add('active');
      outImg.classList.remove('active');
      outBg.classList.remove('active');
    }

    activeLayer = activeLayer === 'A' ? 'B' : 'A';
  }

  function openLightbox(name) {
    if (!isMedia(name)) return;
    const url = '/get/' + encodeURIComponent(name);
    lbCaption.textContent = name;
    const wasActive = lightbox.classList.contains('active');
    lightbox.classList.add('active');
    lightbox.setAttribute('aria-hidden', 'false');
    // Pause anything playing in the right-pane preview so its audio and
    // last frame don't sit behind the lightbox.
    previewArea.querySelectorAll('video, audio').forEach(el => {
      try { el.pause(); } catch (_) {}
    });
    // Reset the toggle on every fresh open so users always start with a
    // clean view; if you re-navigate within an open session the existing
    // stripVisible state is preserved.
    if (!wasActive) stripVisible = false;
    syncStrip();
    applyStripVisibility();

    if (isVideo(name)) {
      // Fade both image layers out; show video.
      lbImageA.classList.remove('active', 'from-left', 'from-right');
      lbImageB.classList.remove('active', 'from-left', 'from-right');
      lbBackdropA.classList.remove('active');
      lbBackdropB.classList.remove('active');
      lbImageA.src = '';
      lbImageB.src = '';
      detachHls(lbVideo);
      lbVideo.classList.remove('hidden');
      resetDominant();
      lastShownName = name;
      // Probe status; if not done yet, keep the video element visible but
      // empty (browser shows its blank state) and let the user dismiss.
      fetch(transcodeStatusUrl(name), { cache: 'no-store' })
        .then(r => r.ok ? r.json() : { status: 'failed', error: 'http ' + r.status })
        .catch(() => ({ status: 'failed', error: 'network' }))
        .then(j => {
          if (lastShownName !== name) return;
          if (j.status === 'done') {
            attachHls(lbVideo, name);
            // autoplay; ignore the promise (browsers may reject without gesture)
            lbVideo.play().catch(() => {});
          } else if (j.status === 'failed') {
            toast('转码失败：' + (j.error || 'unknown'), 'error');
          } else {
            toast('正在转码，稍后再试', '');
          }
        });
      return;
    }

    // Image path.
    detachHls(lbVideo);
    lbVideo.classList.add('hidden');

    const direction = wasActive ? directionBetween(lastShownName, name) : 0;
    const token = ++lbLoadToken;

    const finish = (sourceImg) => {
      if (token !== lbLoadToken) return;
      if (sourceImg) setDominantFromImage(sourceImg);
      showImageOnLayer(url, name, direction);
      lastShownName = name;
      preloadNeighbors(name);
    };

    if (!wasActive) {
      // Fresh open: snap immediately, extract dominant once loaded.
      showImageOnLayer(url, name, 0);
      lastShownName = name;
      const visible = activeImg(); // already swapped inside showImageOnLayer
      visible.addEventListener(
        'load',
        () => { if (token === lbLoadToken) setDominantFromImage(visible); },
        { once: true }
      );
      preloadNeighbors(name);
      return;
    }

    // Subsequent nav: preload + decode, extract dominant from the preloaded
    // image, then trigger the directional crossfade.
    const pre = prefetchImage(url);
    if (pre.complete && pre.naturalWidth > 0) {
      finish(pre);
    } else if (typeof pre.decode === 'function') {
      pre.decode().then(() => finish(pre), () => finish(null));
    } else {
      pre.onload = () => finish(pre);
      pre.onerror = () => finish(null);
    }
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    lightbox.setAttribute('aria-hidden', 'true');
    [lbImageA, lbImageB].forEach(el => {
      el.classList.remove('active', 'from-left', 'from-right');
      el.src = '';
    });
    [lbBackdropA, lbBackdropB].forEach(el => {
      el.classList.remove('active');
      el.style.backgroundImage = '';
    });
    detachHls(lbVideo);
    resetDominant();
    lastShownName = null;
    if (activeFile) {
      const el = fileList.querySelector('.file-item[data-name="' + CSS.escape(activeFile) + '"]');
      if (el) el.scrollIntoView({ block: 'nearest' });
    }
  }

  lightbox.addEventListener('click', e => {
    // close on backdrop click, image click, or close button.
    // video is excluded so its native controls remain usable.
    if (
      e.target === lightbox ||
      e.target === lbClose ||
      e.target.classList.contains('lb-img-layer')
    ) closeLightbox();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && lightbox.classList.contains('active')) closeLightbox();
  });

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Init ──
  refreshList();
})();
</script>
</body>
</html>
